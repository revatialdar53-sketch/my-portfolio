<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spicy food Shop</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* Header */
header{
    background:#ff6600;
    color:white;
    padding:15px;
    text-align:center;
}

/* Navigation */
nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:18px;
}

nav a:hover{
    color:orange;
}

/* Hero Section */
.hero{
    background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
    background-size:cover;
    height:350px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
}

/* Food Menu */
.menu{
    padding:40px;
    text-align:center;
}

.food-items{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.item{
    border:1px solid #ddd;
    padding:15px;
    width:200px;
}

.item img{
    width:100%;
}

.price{
    color:green;
    font-weight:bold;
}

/* Footer */
footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Delicious Food Shop</h1>
<p>Fresh & Tasty Food</p>
</header>

Welcome to Our  Spicy Food Shop
