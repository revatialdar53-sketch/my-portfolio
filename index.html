<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }

        header {
            background: pink;
            padding: 15px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
        }

        nav {
            text-align: center;
            padding: 10px;
            background: #222;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: #f39c12;
        }

        .hero {
            height: 80vh;
            background: url('https://source.unsplash.com/1600x900/?photography') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: pink;
            margin-top: 20px;
        }
    </style>
</head>
